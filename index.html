<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Управление ПК</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: white; padding: 20px; }
    .card { background: #1f1f1f; margin: 15px 0; padding: 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; }
    .card:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <h1 style="text-align:center; margin-bottom:20px;">🖥️ Управление ПК — ДИАГНОСТИКА</h1>
  <div id="status" style="text-align:center; color:#0f0; margin-bottom:20px;">JS загружен ✓</div>

  <div class="card" onclick="testClick('screenshot')">
    <span style="font-size:40px;">📸</span>
    <div>
      <h3>Сделать скриншот</h3>
      <p>Нажми — должен появиться alert</p>
    </div>
  </div>

  <div class="card" onclick="testClick('open')">
    <span style="font-size:40px;">📂</span>
    <div>
      <h3>Открыть приложение</h3>
      <p>Нажми — должен появиться alert</p>
    </div>
  </div>

  <div class="card" onclick="testClick('shutdown')">
    <span style="font-size:40px;">⏻</span>
    <div>
      <h3>Выключить ПК</h3>
      <p>Нажми — должен появиться alert</p>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    document.getElementById('status').innerHTML = '✅ Telegram WebApp готов<br>Нажми любую карточку';

    function testClick(action) {
      alert("✅ JS работает!\nДействие: " + action + "\nСейчас отправляем в бот...");

      const data = action === 'open' 
        ? {action: 'open', target: 'notepad'}
        : {action: action};

      tg.sendData(JSON.stringify(data));
      tg.showPopup({message: "📤 Отправлено в бот: " + action});
      console.log("Отправлено:", data);
    }

    // Если хочешь видеть логи в консоли браузера (для продвинутой отладки)
    console.log("Mini App полностью загружен");
  </script>
</body>
</html>
