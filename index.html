<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Управление ПК</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-[#0f0f0f] text-white min-h-screen">
  <div class="max-w-md mx-auto p-4">
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-2xl font-semibold">🖥️ Управление ПК</h1>
      <div id="user" class="text-sm opacity-70"></div>
    </div>

    <div class="space-y-4">
      <div onclick="sendAction('screenshot')" class="bg-[#1f1f1f] hover:bg-[#2a2a2a] rounded-3xl p-6 flex items-center gap-4 active:scale-95 transition-all cursor-pointer">
        <div class="w-12 h-12 bg-blue-500/20 text-blue-400 rounded-2xl flex items-center justify-center text-3xl">📸</div>
        <div>
          <h3 class="font-semibold text-lg">Сделать скриншот</h3>
          <p class="text-gray-400 text-sm">Текущий экран будет отправлен в чат</p>
        </div>
      </div>

      <div onclick="showOpenAppModal()" class="bg-[#1f1f1f] hover:bg-[#2a2a2a] rounded-3xl p-6 flex items-center gap-4 active:scale-95 transition-all cursor-pointer">
        <div class="w-12 h-12 bg-green-500/20 text-green-400 rounded-2xl flex items-center justify-center text-3xl">📂</div>
        <div>
          <h3 class="font-semibold text-lg">Открыть приложение</h3>
          <p class="text-gray-400 text-sm">Запустить любую программу</p>
        </div>
      </div>

      <div onclick="showShutdownModal()" class="bg-[#1f1f1f] hover:bg-[#2a2a2a] rounded-3xl p-6 flex items-center gap-4 active:scale-95 transition-all cursor-pointer border border-red-500/30">
        <div class="w-12 h-12 bg-red-500/20 text-red-400 rounded-2xl flex items-center justify-center text-3xl">⏻</div>
        <div>
          <h3 class="font-semibold text-lg text-red-400">Выключить компьютер</h3>
          <p class="text-gray-400 text-sm">С подтверждением</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Модальные окна -->
  <div id="openModal" class="hidden fixed inset-0 bg-black/80 flex items-end">
    <div class="bg-[#1f1f1f] w-full rounded-t-3xl p-6">
      <h2 class="text-xl font-semibold mb-4">Открыть приложение</h2>
      <input id="appName" type="text" placeholder="Например: chrome, notepad, explorer" 
             class="w-full bg-[#2a2a2a] rounded-2xl px-4 py-4 text-white outline-none">
      <div class="flex gap-3 mt-6">
        <button onclick="hideOpenAppModal()" class="flex-1 py-4 rounded-2xl bg-gray-700">Отмена</button>
        <button onclick="sendOpenApp()" class="flex-1 py-4 rounded-2xl bg-green-600 font-medium">Открыть</button>
      </div>
    </div>
  </div>

  <div id="shutdownModal" class="hidden fixed inset-0 bg-black/80 flex items-end">
    <div class="bg-[#1f1f1f] w-full rounded-t-3xl p-6">
      <h2 class="text-2xl font-semibold text-red-400 mb-2">Выключить ПК?</h2>
      <p class="text-gray-400 mb-8">Компьютер будет выключен через несколько секунд</p>
      <div class="flex gap-3">
        <button onclick="hideShutdownModal()" class="flex-1 py-4 rounded-2xl bg-gray-700">Отмена</button>
        <button onclick="sendShutdown()" class="flex-1 py-4 rounded-2xl bg-red-600 font-medium">Да, выключить</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    document.getElementById('user').textContent = tg.initDataUnsafe.user?.first_name || 'Пользователь';

    function sendAction(action) {
      tg.sendData(JSON.stringify({action: action}));
      tg.showPopup({message: "Выполняю..."});
    }

    function showOpenAppModal() {
      document.getElementById('openModal').classList.remove('hidden');
      document.getElementById('appName').focus();
    }
    function hideOpenAppModal() {
      document.getElementById('openModal').classList.add('hidden');
    }
    function sendOpenApp() {
      const app = document.getElementById('appName').value.trim();
      if (!app) return;
      tg.sendData(JSON.stringify({action: 'open_app', app: app}));
      hideOpenAppModal();
      tg.showPopup({message: `Открываем ${app}...`});
    }

    function showShutdownModal() {
      document.getElementById('shutdownModal').classList.remove('hidden');
    }
    function hideShutdownModal() {
      document.getElementById('shutdownModal').classList.add('hidden');
    }
    function sendShutdown() {
      tg.sendData(JSON.stringify({action: 'shutdown'}));
      hideShutdownModal();
    }

    tg.onEvent('backButtonClicked', () => tg.close());
  </script>
</body>
</html>
